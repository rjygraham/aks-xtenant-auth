{{define "header"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKS Cross-Tenant Auth — Setup Wizard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f2f1;
      color: #323130;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0078d4;
      color: white;
      padding: 14px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }
    .card {
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 40px 48px;
      width: 100%;
      max-width: 680px;
    }
    h1 { font-size: 1.5rem; color: #0078d4; margin-bottom: 8px; }
    h2 { font-size: 1.05rem; color: #605e5c; font-weight: 400; margin-bottom: 28px; }
    p  { line-height: 1.65; margin-bottom: 14px; color: #3b3a39; }
    ol, ul { padding-left: 22px; margin-bottom: 20px; }
    li { line-height: 1.8; color: #3b3a39; }
    .btn {
      display: inline-block;
      padding: 9px 22px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #106ebe; }
    .btn-outline {
      background: transparent;
      border: 1px solid #0078d4;
      color: #0078d4;
    }
    .btn-outline:hover { background: #eff6fc; }
    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #323130;
      margin-bottom: 5px;
      margin-top: 18px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #c8c6c4;
      border-radius: 3px;
      font-size: 0.95rem;
      color: #323130;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0,120,212,0.2);
    }
    .form-actions { margin-top: 28px; }
    .hint { font-size: 0.82rem; color: #605e5c; margin-top: 4px; }
    .success-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .code-block {
      background: #f3f2f1;
      border: 1px solid #e1dfdd;
      border-radius: 4px;
      padding: 16px 20px;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.85rem;
      white-space: pre;
      overflow-x: auto;
      margin: 16px 0;
      color: #323130;
    }
    .error-icon { font-size: 2.5rem; margin-bottom: 12px; color: #d13438; }
    .error-msg {
      background: #fde7e9;
      border-left: 4px solid #d13438;
      padding: 14px 18px;
      border-radius: 0 4px 4px 0;
      margin-bottom: 24px;
      font-size: 0.95rem;
      color: #323130;
    }
    .divider { border: none; border-top: 1px solid #edebe9; margin: 28px 0; }
    .next-steps { background: #eff6fc; border-radius: 4px; padding: 16px 20px; margin-top: 20px; }
    .next-steps h3 { color: #0078d4; font-size: 1rem; margin-bottom: 10px; }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
      color: #a19f9d;
    }
  </style>
</head>
<body>
<header>AKS Cross-Tenant Auth — Setup Wizard</header>
<main><div class="card">
{{end}}

{{define "footer"}}
</div></main>
<footer>Powered by Azure Workload Identity &amp; Microsoft Entra ID</footer>
</body>
</html>
{{end}}
