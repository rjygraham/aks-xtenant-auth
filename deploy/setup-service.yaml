apiVersion: v1
kind: Service
metadata:
  name: setup
  namespace: aks-xtenant-auth
spec:
  # ClusterIP — intentionally NOT LoadBalancer or NodePort.
  # The setup wizard is an ephemeral admin tool; exposing it publicly creates
  # an unnecessary OAuth attack surface. Access it via:
  #   kubectl port-forward svc/setup 8081:8081 -n aks-xtenant-auth
  # See docs/azure-setup.md for step-by-step port-forward instructions.
  # Do not expose this service publicly.
  type: ClusterIP

  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP

  # Must match the pod labels defined in setup-deployment.yaml.
  selector:
    app: setup
