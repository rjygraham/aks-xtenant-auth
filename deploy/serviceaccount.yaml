apiVersion: v1
kind: ServiceAccount
metadata:
  name: timestampwriter
  namespace: aks-xtenant-auth
  annotations:
    # Identity Bindings: This annotation must be set to the UAMI's client ID
    # (not the multi-tenant Entra app's client ID). The AKS Identity Binding
    # webhook uses this value for the RBAC authorization check — it verifies
    # that this ServiceAccount has "use-managed-identity" permission for the
    # specified UAMI via the ClusterRole in deploy/clusterrole.yaml.
    #
    # The actual AZURE_CLIENT_ID env var used for cross-tenant token exchange
    # is overridden in the Deployment (via the timestampwriter-config ConfigMap)
    # to point to the multi-tenant Entra app, not this UAMI.
    #
    # TODO: Replace <UAMI_CLIENT_ID> with the client ID of the user-assigned
    # managed identity created in docs/azure-setup.md Step 2.
    azure.workload.identity/client-id: "<UAMI_CLIENT_ID>"

    # Source tenant ID — the tenant where the UAMI and Entra app registration live.
    # TODO: Replace <SOURCE_TENANT_ID> with your Azure AD tenant ID.
    # Find this value in docs/azure-setup.md under "Source Tenant ID".
    azure.workload.identity/tenant-id: "<SOURCE_TENANT_ID>"
